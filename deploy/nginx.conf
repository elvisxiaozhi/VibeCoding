server {
    listen 80;
    server_name _;

    # 前端静态文件
    root /opt/asset-dashboard/dist;
    index index.html;

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA 路由回退（前端路由用）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
